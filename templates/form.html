<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add New Community - {{ branch | capitalize }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
</head>
<body class="bg-light">

  <div class="container mt-5">
    <div class="card shadow-lg">
      <div class="card-header bg-primary text-white">
        <h3 class="mb-0"> New Community {{ branch | capitalize }} Department</h3>
      </div>
      <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label">Community Name</label>
            <input type="text" name="community_name" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Community Logo</label>
            <input type="file" name="community_logo" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="4" required></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Photos</label>
            <input type="file" name="photos" class="form-control" multiple>
          </div>

          <div class="mb-3">
            <label class="form-label">Faculty Coordinator Name</label>
            <input type="text" name="faculty_name" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Faculty Coordinator Link</label>
            <input type="url" name="faculty_link" class="form-control" required>
          </div>

          <button type="submit" class="btn btn-success">Submit</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
