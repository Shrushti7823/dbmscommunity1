<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/logincss.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-black">

  <div class="form-container p-5 rounded shadow bg-white">
    <form id="loginForm" class="text-center" action="/login" method="POST">

      <div class="mb-4">
        <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" width="100" alt="User Icon" />
      </div>
      <h3 class="mb-2 text-dark">USER LOGIN</h3>
      <p class="text-dark mb-4">Welcome back! Please login to your account</p>

      <div class="mb-3 input-group">
        <span class="input-group-text bg-white"><i class="bi bi-person-fill"></i></span>
        <input type="text" class="form-control" name="username" placeholder="Username or Email" required />
      </div>

      <div class="mb-3 input-group">
        <span class="input-group-text bg-white"><i class="bi bi-lock-fill"></i></span>
        <input type="password" class="form-control" name="password" placeholder="Password" required />
      </div>

      <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 px-1 text-center">
        <div class="form-check mb-2 mb-md-0">
          <input class="form-check-input" type="checkbox" id="rememberMe" />
          <label class="form-check-label text-dark" for="rememberMe">Remember me</label>
        </div>
        <div>
          <a href="#" class="text-primary me-3" style="text-decoration: none;" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot Password?</a>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 fw-bold">LOGIN</button>

      <div class="mt-3">
        <a href="#" class="text-primary" style="text-decoration: none;" data-bs-toggle="modal" data-bs-target="#createAccountModal">Create Account</a>
      </div>

      <!-- ✅ Show message only if exists -->
      {% if message %}
        <div class="mt-3 alert {% if 'Successful' in message %}alert-success{% else %}alert-danger{% endif %}" role="alert">
          {{ message }}
        </div>
      {% endif %}

    </form>
  </div>

  <!-- ✅ Forgot Password Modal (Active) -->
  <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content p-3">
        <div class="modal-header border-0">
          <h5 class="modal-title text-dark" id="forgotPasswordModalLabel">Reset Your Password</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="resetPasswordForm">
            <div class="mb-3">
              <label for="resetEmail" class="form-label text-dark">Email address</label>
              <input type="email" class="form-control" id="resetEmail" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
              <label for="newPassword" class="form-label text-dark">New Password</label>
              <input type="password" class="form-control" id="newPassword" placeholder="Enter new password" required>
            </div>
            <div class="mb-3">
              <label for="confirmPassword" class="form-label text-dark">Confirm Password</label>
              <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Submit</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- ✅ Create Account Modal (Active) -->
  <div class="modal fade" id="createAccountModal" tabindex="-1" aria-labelledby="createAccountModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content p-3">
        <div class="modal-header border-0">
          <h5 class="modal-title text-dark" id="createAccountModalLabel">Create New Account</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="signupForm">
            <div class="mb-3">
              <label for="signupUsername" class="form-label text-dark">Username</label>
              <input type="text" class="form-control" id="signupUsername" placeholder="Enter your username" required>
            </div>
            <div class="mb-3">
              <label for="signupEmail" class="form-label text-dark">Email</label>
              <input type="email" class="form-control" id="signupEmail" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
              <label for="signupPassword" class="form-label text-dark">Password</label>
              <input type="password" class="form-control" id="signupPassword" placeholder="Enter password" required>
            </div>
            <div class="mb-3">
              <label for="signupMobile" class="form-label text-dark">Mobile Number</label>
              <input type="tel" class="form-control" id="signupMobile" placeholder="Enter your mobile number" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Create Account</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
